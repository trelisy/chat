
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERMES</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #39ff14;
    --dark: #070a05;
    --panel: #0d1209;
    --border: #2a3d1c;
    --text: #b8d4a0;
    --dim: #4a6b38;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: var(--dark);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 10;
    background-color: var(--panel);
    border: 1px solid var(--border);
    width: 90%;
    max-width: 400px;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
  }

  .header .label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .header h1 {
    margin: 0;
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--green);
    text-shadow: 0 0 15px rgba(57,255,20,0.4);
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--dim);
    transition: all 0.2s;
    border-right: 1px solid var(--border);
    text-transform: uppercase;
  }

  .tab:last-child { border-right: none; }

  .tab.active {
    color: var(--green);
    background: rgba(57,255,20,0.05);
  }

  .tab:hover:not(.active) { color: var(--text); }

  #formContainer {
    padding: 24px;
  }

  .form-group {
    width: 100%;
    margin-bottom: 1rem;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .form-group input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
    background-color: #080d06;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group input:focus { border-color: var(--green); }
  .form-group input::placeholder { color: var(--dim); font-size: 12px; }

  button {
    padding: 12px;
    border: 1px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 3px;
    font-family: 'Oswald', sans-serif;
    transition: all 0.2s;
    width: 100%;
    text-transform: uppercase;
  }

  button:hover { background: var(--green); color: var(--dark); }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    #formContainer { padding: 18px; }
    .form-group input { font-size: 13px; }
    button { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="label">SECURE COMMS</div>
    <h1>HERMES</h1>
  </div>

  <div class="tabs">
    <div class="tab active" id="loginTab">LOGIN</div>
    <div class="tab" id="registerTab">REGISTER</div>
  </div>

  <div id="formContainer">
    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label for="loginEmail">IDENTIFIER (EMAIL)</label>
        <input type="email" id="loginEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="loginPassword">ACCESS CODE</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button id="loginBtn">AUTHENTICATE</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label for="regEmail">EMAIL</label>
        <input type="email" id="regEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="regPassword">ACCESS CODE</label>
        <input type="password" id="regPassword" placeholder="Enter your password">
      </div>
      <div class="form-group">
        <label for="regName">CALLSIGN</label>
        <input type="text" id="regName" placeholder="Your display name">
      </div>
      <button id="registerBtn">REGISTER</button>
    </div>
  </div>

  <div class="footer-note">AUTHORIZED PERSONNEL ONLY</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
import { getDatabase, ref as dbRef, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpfkkOznjSvyyaEWNsG00huwlA8ObY6j8",
  authDomain: "chat-80d74.firebaseapp.com",
  projectId: "chat-80d74",
  storageBucket: "chat-80d74.appspot.com",
  messagingSenderId: "1085559718603",
  appId: "1:1085559718603:web:c7a9a7f26b1535d080514e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const loginTab = document.getElementById('loginTab');
const registerTab = document.getElementById('registerTab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');

loginTab.addEventListener('click', () => {
  loginTab.classList.add('active');
  registerTab.classList.remove('active');
  loginForm.style.display = 'block';
  registerForm.style.display = 'none';
});

registerTab.addEventListener('click', () => {
  registerTab.classList.add('active');
  loginTab.classList.remove('active');
  loginForm.style.display = 'none';
  registerForm.style.display = 'block';
});

document.getElementById('registerBtn').addEventListener('click', async () => {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const displayName = document.getElementById('regName').value;

  if (!email || !password || !displayName) {
    alert('Please fill all required fields');
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await updateProfile(user, { displayName });

    await set(dbRef(db, 'users/' + user.uid), {
      displayName,
      email,
      avatar: ''
    });

    alert('Registration successful!');
    window.location.href = 'chat.html';
  } catch (error) {
    alert(error.message);
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) { alert('Please enter email and password'); return; }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'chat.html';
  } catch (error) { alert(error.message); }
});

window.addEventListener('load', () => {
  onAuthStateChanged(auth, user => {
    if (user) console.log('User already logged in:', user.email);
  });
});
</script>

</body>
</html>
