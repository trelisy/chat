<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HERMES</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #39ff14;
    --amber: #ffb300;
    --red: #ff3b30;
    --dark: #070a05;
    --panel: #0d1209;
    --panel2: #101810;
    --border: #2a3d1c;
    --text: #b8d4a0;
    --dim: #4a6b38;
    --msg-me: #0f2b0a;
    --msg-other: #0a1209;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* NAVBAR */
  #navbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 50;
    flex-shrink: 0;
  }

  .nav-brand {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 10px rgba(57,255,20,0.4);
  }

  .nav-links { display: flex; gap: 6px; align-items: center; }

  .nav-link {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 10px;
    border: 1px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .nav-link:hover, .nav-link.active {
    color: var(--green);
    border-color: var(--border);
    background: rgba(57,255,20,0.05);
  }

  .nav-link.active { color: var(--green); }

  #logoutBtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  #logoutBtn:hover { border-color: var(--red); color: var(--red); }

  /* STATUS BAR */
  .status-strip {
    background: rgba(57,255,20,0.04);
    border-bottom: 1px solid var(--border);
    padding: 4px 16px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .status-strip .live { color: var(--green); }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px calc(70px + env(safe-area-inset-bottom)) 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 85%;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.mine { margin-left: auto; flex-direction: row-reverse; }

  .avatar-img {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    object-fit: cover;
    flex-shrink: 0;
    filter: saturate(0.3);
  }

  .avatar-placeholder {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--panel2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .bubble {
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--msg-other);
    position: relative;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    max-width: 100%;
  }

  .mine .bubble {
    background: var(--msg-me);
    border-color: rgba(57,255,20,0.25);
  }

  .sender-tag {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green);
    margin-bottom: 4px;
    display: block;
  }

  .msg-time {
    font-size: 9px;
    color: var(--dim);
    margin-top: 4px;
    display: block;
    letter-spacing: 1px;
  }

  img.chat-img {
    max-width: 220px;
    max-height: 220px;
    display: block;
    margin-top: 8px;
    border: 1px solid var(--border);
    filter: saturate(0.6);
  }

  .del-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--red);
    width: 20px;
    height: 20px;
    font-size: 10px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .mine .bubble:hover .del-btn { display: flex; }

  /* INPUT BAR */
  #sendMsg {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
  }

  #msgTxt {
    flex: 1;
    background: #080d06;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }

  #msgTxt:focus { border-color: var(--green); }
  #msgTxt::placeholder { color: var(--dim); font-size: 12px; }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    width: 42px;
    height: 42px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .icon-btn:hover { border-color: var(--green); color: var(--green); }

  #msgBtn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 0 16px;
    height: 42px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  #msgBtn:hover {
    background: var(--green);
    color: var(--dark);
  }

  @media (max-width: 640px) {
    .msg-wrap { max-width: 95%; }
  }
</style>
</head>
<body>

<div id="navbar">
  <div class="nav-brand">HERMES</div>
  <div class="nav-links">
    <a href="chat.html" class="nav-link active">COMMS</a>
    <a href="missions.html" class="nav-link">MISSIONS</a>
    <button id="logoutBtn">DISCONNECT</button>
  </div>
</div>

<div class="status-strip">
  <span><span class="dot"></span><span class="live">CHANNEL OPEN</span> // ENCRYPTED</span>
  <span id="clock">--:--:-- UTC</span>
</div>

<div id="messages"></div>

<div id="sendMsg">
  <input type="file" id="imgInput" accept="image/*" style="display:none">
  <button class="icon-btn" id="imgBtn" title="Upload Image">📡</button>
  <input type="text" id="msgTxt" placeholder="TRANSMIT MESSAGE...">
  <button id="msgBtn">SEND ▶</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
  import { getDatabase, ref, set, remove, onChildAdded, onChildRemoved, get } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpfkkOznjSvyyaEWNsG00huwlA8ObY6j8",
    authDomain: "chat-80d74.firebaseapp.com",
    projectId: "chat-80d74",
    storageBucket: "chat-80d74.appspot.com",
    messagingSenderId: "1085559718603",
    appId: "1:1085559718603:web:c7a9a7f26b1535d080514e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);

  const msgTxt = document.getElementById("msgTxt");
  const imgInput = document.getElementById("imgInput");
  const imgBtn = document.getElementById("imgBtn");
  const msgBtn = document.getElementById("msgBtn");
  const messages = document.getElementById("messages");
  const logoutBtn = document.getElementById("logoutBtn");

  let currentUser;
  let currentUsername = '';

  // Clock
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour12: false }) + ' ET';
  }, 1000);

  // ── NOTIFICATIONS ──────────────────────────────────────────
  async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  }

  function sendNotif(title, body, icon = '') {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (document.visibilityState === 'visible') return; // only notify when tab is hidden
    const n = new Notification(title, { body, icon, silent: false });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(() => n.close(), 6000);
  }
  // ────────────────────────────────────────────────────────────

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    requestNotifPermission();
    // Try DB first, then Auth profile — never fall back to email
    async function fetchUsername() {
      try {
        const snap = await get(ref(db, 'users/' + user.uid));
        console.log('DB snap exists:', snap.exists(), 'val:', snap.exists() ? snap.val() : null);
        if (snap.exists() && snap.val().displayName) return snap.val().displayName;
      } catch(e) {
        console.error('DB read failed:', e);
      }
      console.log('Auth displayName:', user.displayName);
      if (user.displayName) return user.displayName;
      // Reload auth in case it's stale
      try { await user.reload(); } catch(e) {}
      if (auth.currentUser && auth.currentUser.displayName) return auth.currentUser.displayName;
      return 'AGENT';
    }
    currentUsername = await fetchUsername();
    console.log('Final username:', currentUsername);
  });

  logoutBtn.onclick = async () => { await signOut(auth); window.location.href = "index.html"; };

  async function sendMessage() {
    if (!msgTxt.value.trim()) return;
    const msg = msgTxt.value.trim();
    const timestamp = Date.now();
    set(ref(db, "messages/" + timestamp), {
      msg, sender: currentUsername, uid: currentUser.uid, time: timestamp
    });
    msgTxt.value = "";
  }

  msgBtn.onclick = sendMessage;
  msgTxt.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

  imgBtn.onclick = () => imgInput.click();
  imgInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const timestamp = Date.now();
    const imageRef = sRef(storage, "images/" + timestamp + "_" + file.name);
    await uploadBytes(imageRef, file);
    const url = await getDownloadURL(imageRef);
    set(ref(db, "messages/" + timestamp), {
      img: url, sender: currentUsername, uid: currentUser.uid, time: timestamp
    });
  };

  let initialLoadDone = false;
  setTimeout(() => { initialLoadDone = true; }, 2500); // suppress notifs for messages already in DB

  onChildAdded(ref(db, "messages"), async (data) => {
    const val = data.val();
    const isMine = currentUser && val.uid === currentUser.uid;

    // Fire notification for messages from others, after initial load
    if (initialLoadDone && !isMine) {
      const preview = val.msg ? val.msg.slice(0, 80) : '📡 [IMAGE]';
      sendNotif(`HERMES // NEW TRANSMISSION`, `▸ ${val.sender}: ${preview}`);
    }

    let avatarHTML = '';
    try {
      const snap = await get(ref(db, 'users/' + val.uid));
      if (snap.exists() && snap.val().avatar) {
        avatarHTML = `<img src="${snap.val().avatar}" class="avatar-img">`;
      } else {
        const initials = (val.sender || '?')[0].toUpperCase();
        avatarHTML = `<div class="avatar-placeholder">${initials}</div>`;
      }
    } catch { avatarHTML = `<div class="avatar-placeholder">?</div>`; }

    const timeStr = val.time ? new Date(val.time).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour12: false }) : '';

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap' + (isMine ? ' mine' : '');
    wrap.id = data.key;

    wrap.innerHTML = `
      ${!isMine ? avatarHTML : ''}
      <div class="bubble">
        ${!isMine ? `<span class="sender-tag">▸ ${val.sender}</span>` : ''}
        ${val.msg ? val.msg : ''}
        ${val.img ? `<img src="${val.img}" class="chat-img">` : ''}
        <span class="msg-time">${timeStr} ET</span>
        ${isMine ? `<button class="del-btn" onclick="window._del('${data.key}')">✕</button>` : ''}
      </div>
      ${isMine ? avatarHTML : ''}
    `;

    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  });

  window._del = (key) => remove(ref(db, "messages/" + key));

  onChildRemoved(ref(db, "messages"), (data) => {
    document.getElementById(data.key)?.remove();
  });

  msgTxt.addEventListener("focus", () => {
    setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 300);
  });

  window.addEventListener("resize", () => { messages.scrollTop = messages.scrollHeight; });
</script>
</body>
</html>
